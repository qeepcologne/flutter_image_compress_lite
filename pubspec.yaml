name: flutter_image_compress_lite
description: Minimal, legacy-free image compression for Flutter (Android + iOS) — no CocoaPods, SPM-only, minimal native deps. Replacement for flutter_image_compress.
repository: https://github.com/qeepcologne/flutter_image_compress_lite
version: 2.5.3

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  cross_file: ^0.3.5+2

flutter:
  plugin:
    platforms:
      android:
        package: com.fluttercandies.flutter_image_compress
        pluginClass: ImageCompressPlugin
      ios:
        pluginClass: ImageCompressPlugin
